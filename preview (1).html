                                                            <p className="text-sm text-slate-800 font-serif mb-2 leading-relaxed">{poem.text}</p>
                                                            {lang === 'en' && poem.trans && (
                                                                <p className="text-xs text-slate-500 italic mb-2 leading-relaxed">{poem.trans}</p>
                                                            )}
                                                            <div className="flex items-center justify-end gap-2 text-xs">
                                                                <span className="text-purple-700 font-bold">{poem.author[lang]}</span>
                                                                <span className="text-slate-400">《{poem.title[lang]}》</span>
                                                            </div>
                                                            {((lang === 'zh' && poem.note && poem.note.zh) || (lang === 'en' && poem.note && poem.note.en) || poem.ctext) && (
                                                                <div className="mt-2 pt-2 border-t border-purple-100 text-xs text-slate-500 flex items-center justify-between gap-2">
                                                                    <span>{poem.note ? poem.note[lang] : ''}</span>
                                                                    {poem.ctext && <a href={poem.ctext} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline shrink-0">ctext ↗</a>}
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </>
                            );
                        })()}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ZuoZhuanMap />);
    </script>
</body>
</html>
